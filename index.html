<!DOCTYPE html>
<html>
<head>
<title>Energy Plants in India</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
margin:0;
font-family:Segoe UI;
background:#0f172a;
color:white;
}

header{
background:linear-gradient(90deg,#0704e7,#da1c07);
padding:18px;
text-align:center;
font-size:22px;
font-weight:bold;
}

#map{
height:420px;
}

.controls{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:10px;
padding:15px;
background:#1e293b;
}

button{
padding:10px 18px;
border:none;
border-radius:30px;
background:#3b82f6;
color:white;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#22c55e;
}

.dashboard{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
padding:25px;
}

.card{
background:#1e293b;
border-radius:15px;
padding:20px;
text-align:center;
box-shadow:0 4px 15px rgba(0,0,0,0.4);
}

.card h2{
font-size:30px;
color:#d00665;
margin:10px 0;
}

.chart-card{
background:#1e293b;
border-radius:15px;
padding:20px;
box-shadow:0 4px 15px rgba(0,0,0,0.4);
}

</style>
</head>

<body>

<header>
Renewable & Non-Renewable Energy Plants in India
</header>

<div id="map"></div>

<div class="controls">

<button onclick="filterEnergy('All')">All</button>
<button onclick="filterEnergy('Solar')">Solar</button>
<button onclick="filterEnergy('Wind')">Wind</button>
<button onclick="filterEnergy('Hydro')">Hydro</button>
<button onclick="filterEnergy('Thermal')">Thermal</button>
<button onclick="filterEnergy('Nuclear')">Nuclear</button>

</div>

<div class="dashboard">

<div class="card">
<p>Total Capacity</p>
<h2 id="capacity">0 GW</h2>
</div>

<div class="card">
<p>Renewable Share</p>
<h2 id="renewable">0%</h2>
</div>

<div class="card">
<p>CO₂ Emission</p>
<h2 id="co2">0 MT</h2>
</div>

<div class="chart-card">
<canvas id="chart"></canvas>
</div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

var map = L.map('map').setView([22.97,78.65],5);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png')
.addTo(map);

var plants=[

{name:"Kudankulam",type:"Nuclear",capacity:6,co2:20,location:[8.17,77.71]},

{name:"Vindhyachal",type:"Thermal",capacity:13,co2:200,location:[24.10,82.67]},

{name:"Rajasthan Solar Park",type:"Solar",capacity:10,co2:0,location:[27.02,71.45]},

{name:"Muppandal Wind Farm",type:"Wind",capacity:5,co2:0,location:[8.25,77.55]},

{name:"Tehri Dam",type:"Hydro",capacity:4,co2:0,location:[30.38,78.48]}

];

var markers=[];
var chart;

function loadMarkers(data){

markers.forEach(m=>map.removeLayer(m));
markers=[];

var total=0;
var renewable=0;
var co2=0;

data.forEach(p=>{

var marker=L.marker(p.location).addTo(map)
.bindPopup("<b>"+p.name+"</b><br>"+p.type+"<br>"+p.capacity+" GW");

markers.push(marker);

total+=p.capacity;

if(p.type=="Solar" || p.type=="Wind" || p.type=="Hydro")
renewable+=p.capacity;

co2+=p.co2;

});

updateDashboard(total,renewable,co2,data);

}

function updateDashboard(total,renewable,co2,data){

document.getElementById("capacity").innerText=total+" GW";

var percent=Math.round((renewable/total)*100);

document.getElementById("renewable").innerText=percent+"%";

document.getElementById("co2").innerText=co2+" MT";

updateChart(data);

}

function filterEnergy(type){

if(type=="All"){
loadMarkers(plants);
}
else{
var filtered=plants.filter(p=>p.type==type);
loadMarkers(filtered);
}

}

function updateChart(data){

var types={};

data.forEach(p=>{
types[p.type]=(types[p.type]||0)+p.capacity;
});

if(chart){
chart.destroy();
}

chart=new Chart(document.getElementById("chart"),{

type:"bar",

data:{
labels:Object.keys(types),
datasets:[{
label:"Energy Capacity (GW)",
data:Object.values(types),
backgroundColor:[
"#f59e0b",
"#22c55e",
"#3b82f6",
"#ef4444",
"#a855f7"
]
}]
},

options:{
plugins:{
legend:{
display:false
}
},
scales:{
y:{
beginAtZero:true,
title:{
display:true,
text:"Capacity (GW)"
}
}
}
}

});

}

loadMarkers(plants);

</script>

</body>
</html>
